<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - La Paradoja de la Felicidad</title>
    <style>
       
        :root {
            --azul-oscuro: #1b4570;
            --azul-claro: #4299e1;
            --blanco-transparente: rgba(255, 255, 255, 0.92);
            --sombra: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

       
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(27, 69, 112, 0.6), rgba(27, 69, 112, 0.6)), 
                              url("https://wallpapers.com/images/hd/happiness-1920-x-1280-background-hls6ssejygjsd35p.jpg");
            background-size: cover;
            background-position: center;
            filter: blur(3px);
            z-index: -1;
            transform: scale(1.1);
        }

        .container {
            background-color: var(--blanco-transparente);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px var(--sombra);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .header h1 {
            color: var(--azul-oscuro);
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--azul-claro);
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--azul-oscuro);
            margin-bottom: 6px;
            margin-left: 4px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #cbd5e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--azul-claro);
            box-shadow: 0 0 10px rgba(66, 153, 225, 0.2);
        }

        .info-pill {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--azul-claro), var(--azul-oscuro));
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(27, 69, 112, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(27, 69, 112, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #718096;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <div class="header">
            <h1>Inscríbete</h1>
            <p>CONGRESO: LA PARADOJA DE LA FELICIDAD</p>
        </div>

        <form action="#">
            <div class="form-group">
                <label>NOMBRE COMPLETO</label>
                <input type="text" placeholder="Ej. Abraham Baeza" required>
            </div>

            <div class="form-group">
                <label>CORREO ELECTRÓNICO</label>
                <input type="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label>PERFIL</label>
                <select required>
                    <option value="" disabled selected>Selecciona tu perfil</option>
                    <option value="estudiante">Estudiante</option>
                    <option value="publico">Público General</option>
                </select>
            </div>

            <div class="info-pill">
                📍 <span>Auditorio La Isla Mérida | 20 de Marzo</span>
            </div>

            <button type="submit">OBTENER MI PASE DIGITAL</button>
        </form>

        <p class="footer-text">Cupo limitado por protocolo de auditorio.</p>
    </div>

</body>
</html>
