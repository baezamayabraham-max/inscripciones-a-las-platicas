<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - La Paradoja de la Felicidad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <div class="header">
            <h1>Inscríbete</h1>
            <p>CONGRESO: LA PARADOJA DE LA FELICIDAD</p>
        </div>

        <form action="#">
            <div class="form-group">
                <label for="nombre">NOMBRE COMPLETO</label>
                <input type="text" id="nombre" placeholder="Ej. Abraham Baeza" required>
            </div>

            <div class="form-group">
                <label for="email">CORREO ELECTRÓNICO</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="perfil">PERFIL</label>
                <select id="perfil" required>
                    <option value="" disabled selected>Selecciona tu perfil</option>
                    <option value="docente">Docente</option>
                    <option value="estudiante">Estudiante</option>
                    <option value="publico">Público General</option>
                </select>
            </div>

            <div class="info-pill">
                📍 <span>Auditorio La Isla Mérida | 20 de Marzo</span>
            </div>

            <button type="submit">OBTENER MI PASE DIGITAL</button>
        </form>

        <p class="footer-text">Cupo limitado por protocolo de auditorio.</p>
    </div>

</body>
</html>
